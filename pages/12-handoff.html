<section class="page-view handoff-page" data-page="handoff">
  <div class="page-heading handoff-heading">
    <div>
      <p class="eyebrow">최종 결심을 다음 운용자가 바로 이어받게 합니다.</p>
      <h2>인수인계 센터</h2>
    </div>
    <div class="handoff-actions" aria-label="인수인계 실행">
      <button class="mode-button" type="button" data-handoff-action="stage" data-handoff-ref="submit">제출</button>
      <button class="mode-button" type="button" data-handoff-action="stage" data-handoff-ref="retrain">훈련</button>
      <button class="combat-button inverse" type="button" data-handoff-action="download"><i data-lucide="download" aria-hidden="true"></i>인계</button>
    </div>
  </div>

  <div class="handoff-workspace">
    <section class="hard-panel handoff-summary-panel" id="handoffSummaryPanel" aria-label="인수인계 요약"></section>
    <section class="hard-panel handoff-recipient-panel" id="handoffRecipientPanel" aria-label="수신자별 인계"></section>
    <section class="hard-panel handoff-signal-panel" id="handoffSignalPanel" aria-label="교신 문안"></section>
    <section class="hard-panel handoff-packet-panel" id="handoffPacketPanel" aria-label="인수인계 패킷"></section>
  </div>
</section>
