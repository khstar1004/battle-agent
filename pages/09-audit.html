<section class="page-view audit-page" data-page="audit">

      <h2>감사 로그</h2>
    </div>
    <div class="audit-actions" aria-label="감사 로그 실행">
      <button class="mode-button" type="button" data-audit-action="stage" data-audit-ref="data">자료</button>

      <button class="mode-button" type="button" data-audit-action="stage" data-audit-ref="aar">AAR</button>

    <section class="hard-panel audit-evidence-panel" id="auditEvidencePanel" aria-label="근거 원장"></section>
