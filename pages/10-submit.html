<section class="page-view submit-page" data-page="submit">
  <div class="page-heading submit-heading">
    <div>
      <p class="eyebrow">최종 제출 패키지를 잠급니다.</p>
      <h2>제출 패키지</h2>
    </div>
    <div class="submit-actions" aria-label="제출 패키지 실행">
      <button class="mode-button" type="button" data-submit-action="stage" data-submit-ref="briefing">브리핑</button>
      <button class="mode-button" type="button" data-submit-action="stage" data-submit-ref="audit">감사</button>
      <button class="combat-button inverse" type="button" data-submit-action="download"><i data-lucide="download" aria-hidden="true"></i>패키지</button>
    </div>
  </div>

  <div class="submit-workspace">
    <section class="hard-panel submit-readiness-panel" id="submitReadinessPanel" aria-label="제출 준비도"></section>
    <section class="hard-panel submit-bundle-panel" id="submitBundlePanel" aria-label="산출물 묶음"></section>
    <section class="hard-panel submit-checklist-panel" id="submitChecklistPanel" aria-label="제출 체크리스트"></section>
    <section class="hard-panel submit-manifest-panel" id="submitManifestPanel" aria-label="제출 매니페스트"></section>
  </div>
</section>
