<section class="page-view queue-page" id="page-queue" data-page="queue" role="tabpanel" aria-labelledby="tab-queue" hidden>
  <div class="page-heading queue-heading">
    <div>
      <p class="eyebrow">남은 검토 산출물을 담당자와 우선순위가 있는 작업으로 정리합니다.</p>
      <h2>조치 큐</h2>
    </div>
    <div class="queue-actions" aria-label="조치 큐 실행">
      <button class="mode-button" type="button" data-queue-action="stage" data-queue-ref="challenge">검증</button>
      <button class="mode-button" type="button" data-queue-action="stage" data-queue-ref="handoff">인계</button>
      <button class="combat-button inverse" type="button" data-queue-action="download"><i data-lucide="download" aria-hidden="true"></i>큐</button>
    </div>
  </div>

  <div class="queue-workspace">
    <section class="hard-panel queue-overview-panel" id="queueOverviewPanel" aria-label="조치 큐 요약"></section>
    <section class="hard-panel queue-priority-panel" id="queuePriorityPanel" aria-label="우선순위 큐"></section>
    <section class="hard-panel queue-owner-panel" id="queueOwnerPanel" aria-label="담당자 부하"></section>
    <section class="hard-panel queue-gate-panel" id="queueGatePanel" aria-label="완료 게이트"></section>
  </div>
</section>
