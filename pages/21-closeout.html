<section class="page-view closeout-page" id="page-closeout" data-page="closeout" role="tabpanel" aria-labelledby="tab-closeout" hidden>
  <div class="page-heading closeout-heading">
    <div>
      <p class="eyebrow">결심, 수신 확인, 예외 처리, 보관 산출물을 종결 보고로 잠급니다.</p>
      <h2>종결 보고</h2>
    </div>
    <div class="closeout-actions" aria-label="종결 보고 실행">
      <button class="mode-button" type="button" data-closeout-action="stage" data-closeout-ref="receipt">확인</button>
      <button class="mode-button" type="button" data-closeout-action="stage" data-closeout-ref="submit">제출</button>
      <button class="combat-button inverse" type="button" data-closeout-action="download">보고</button>
    </div>
  </div>

  <div class="closeout-workspace">
    <section class="hard-panel closeout-overview-panel" id="closeoutOverviewPanel" aria-label="종결 보고 요약"></section>
    <section class="hard-panel closeout-decision-panel" id="closeoutDecisionPanel" aria-label="종결 판단 항목"></section>
    <section class="hard-panel closeout-exception-panel" id="closeoutExceptionPanel" aria-label="예외 처리"></section>
    <section class="hard-panel closeout-archive-panel" id="closeoutArchivePanel" aria-label="보관 산출물"></section>
  </div>
</section>
