<section class="page-view retrain-page" data-page="retrain">
  <div class="page-heading retrain-heading">
    <div>
      <p class="eyebrow">AAR 조치를 72시간 재훈련으로 바꿉니다.</p>
      <h2>재훈련 계획</h2>
    </div>
    <div class="retrain-actions" aria-label="재훈련 계획 실행">
      <button class="mode-button" type="button" data-retrain-action="stage" data-retrain-ref="aar">AAR</button>
      <button class="mode-button" type="button" data-retrain-action="stage" data-retrain-ref="audit">감사</button>
      <button class="combat-button inverse" type="button" data-retrain-action="download"><i data-lucide="download" aria-hidden="true"></i>계획</button>
    </div>
  </div>

  <div class="retrain-workspace">
    <section class="hard-panel retrain-schedule-panel" id="retrainSchedulePanel" aria-label="72시간 재훈련 일정"></section>
    <section class="hard-panel retrain-owner-panel" id="retrainOwnerPanel" aria-label="훈련 과제와 담당자"></section>
    <section class="hard-panel retrain-validation-panel" id="retrainValidationPanel" aria-label="검증 게이트"></section>
    <section class="hard-panel retrain-drill-panel" id="retrainDrillPanel" aria-label="선택 훈련 과제"></section>
  </div>
</section>
