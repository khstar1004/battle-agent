<section class="page-view watch-page" data-page="watch">
  <div class="page-heading watch-heading">
    <div>
      <p class="eyebrow">결심 이후 재판단 신호를 감시합니다.</p>
      <h2>상황 감시</h2>
    </div>
    <div class="watch-actions" aria-label="상황 감시 실행">
      <button class="mode-button" type="button" data-watch-action="stage" data-watch-ref="risk">위험</button>
      <button class="mode-button" type="button" data-watch-action="stage" data-watch-ref="decision">결심</button>
      <button class="combat-button inverse" type="button" data-watch-action="download"><i data-lucide="download" aria-hidden="true"></i>감시</button>
    </div>
  </div>

  <div class="watch-workspace">
    <section class="hard-panel watch-overview-panel" id="watchOverviewPanel" aria-label="재판단 감시 요약"></section>
    <section class="hard-panel watch-trigger-panel" id="watchTriggerPanel" aria-label="트리거 보드"></section>
    <section class="hard-panel watch-signal-panel" id="watchSignalPanel" aria-label="전파 문안"></section>
    <section class="hard-panel watch-action-panel" id="watchActionPanel" aria-label="재판단 조치"></section>
  </div>
</section>
