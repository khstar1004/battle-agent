<section class="page-view challenge-page" id="page-challenge" data-page="challenge" role="tabpanel" aria-labelledby="tab-challenge" hidden>
  <div class="page-heading challenge-heading">
    <div>
      <p class="eyebrow">최종 결심을 다시 흔들어 반증 가능성을 확인합니다.</p>
      <h2>반증 검증</h2>
    </div>
    <div class="challenge-actions" aria-label="반증 검증 실행">
      <button class="mode-button" type="button" data-challenge-action="stage" data-challenge-ref="decision">결심</button>
      <button class="mode-button" type="button" data-challenge-action="stage" data-challenge-ref="risk">위험</button>
      <button class="combat-button inverse" type="button" data-challenge-action="download"><i data-lucide="download" aria-hidden="true"></i>검증</button>
    </div>
  </div>

  <div class="challenge-workspace">
    <section class="hard-panel challenge-overview-panel" id="challengeOverviewPanel" aria-label="반증 검증 요약"></section>
    <section class="hard-panel challenge-assumption-panel" id="challengeAssumptionPanel" aria-label="가정 보드"></section>
    <section class="hard-panel challenge-counter-panel" id="challengeCounterPanel" aria-label="반증 신호"></section>
    <section class="hard-panel challenge-action-panel" id="challengeActionPanel" aria-label="검증 조치"></section>
  </div>
</section>
