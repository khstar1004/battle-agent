<section class="page-view graph-page" data-page="ontology">
  <div class="page-heading">
    <div>
      <p class="eyebrow">문서가 아니라 관계를 봅니다.</p>
      <h2>그래프 구축</h2>
    </div>
    <div class="graph-modes" role="tablist" aria-label="그래프 필터">
      <button class="mode-button is-active" data-graph-mode="all" type="button">전체</button>
      <button class="mode-button" data-graph-mode="evidence" type="button">근거</button>
      <button class="mode-button" data-graph-mode="debate" type="button">토론</button>
      <button class="mode-button" data-graph-mode="failure" type="button">실패경로</button>
      <button class="mode-button" data-graph-mode="decision" type="button">결심</button>
    </div>
  </div>

  <div class="page-guide-strip" id="graphGuideStrip" aria-label="그래프 구축 읽는 법">
    <article><span>1</span><b>근거가 어디에 연결됐나</b><em>문서, 방책, 실패경로, 결심 사이의 연결선을 봅니다.</em></article>
    <article><span>2</span><b>노드를 선택한다</b><em>오른쪽에서 선택 노드의 근거와 관련 발언을 확인합니다.</em></article>
    <article><span>3</span><b>필터로 좁힌다</b><em>근거, 토론, 실패경로, 결심만 따로 확인합니다.</em></article>
  </div>

  <div class="graph-workspace">
    <section class="graph-theater" aria-label="온톨로지 그래프">
      <div class="graph-backdrop" aria-hidden="true"></div>
      <div class="graph-stage">
        <svg id="ontologySvg" viewBox="0 0 1000 700" role="img" aria-labelledby="ontologyTitle ontologyDesc">
          <title id="ontologyTitle">작전 온톨로지 네트워크</title>
          <desc id="ontologyDesc">작전 자료, 방책, 제약, 에이전트, 실패경로, 결심카드를 연결한 온톨로지 그래프.</desc>
          <defs>
            <filter id="nodeGlow" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="3" result="coloredBlur" />
              <feMerge><feMergeNode in="coloredBlur" /><feMergeNode in="SourceGraphic" /></feMerge>
            </filter>
          </defs>
          <g class="grid-lines" aria-hidden="true"></g>
          <g id="edgeLayer"></g>
          <g id="nodeLayer"></g>
        </svg>
      </div>
    </section>

    <aside class="hard-panel graph-inspector">
      <div class="panel-heading"><span>그래프 인스펙터</span><b id="ontologyCountLabel">0개 노드</b></div>
      <div class="legend-block">
        <span class="legend-chip document"></span>문서/근거
        <span class="legend-chip coa"></span>방책
        <span class="legend-chip agent"></span>에이전트
        <span class="legend-chip factor"></span>제약
        <span class="legend-chip risk"></span>위험
        <span class="legend-chip decision"></span>결심
      </div>
      <div class="selected-node" id="selectedNode"><b>선택 노드</b><span>노드를 선택하면 관련 파일, 에이전트 발언, 실패경로 연결을 표시합니다.</span></div>
      <div class="evidence-panel" id="evidencePreview" aria-live="polite"></div>
    </aside>
  </div>
</section>
